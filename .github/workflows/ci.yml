name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-offline:
    name: offline tests / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install editable packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e packages/ringwood[dev]
          python -m pip install -e packages/ringwood-mcp

      - name: Run offline tests (21 cases, no API key)
        run: |
          cd packages/ringwood
          python -m pytest tests/ -v

      - name: Sanity-check MCP server loads
        run: |
          python -c "
          from pathlib import Path
          from ringwood_mcp.server import build_server
          mcp = build_server(Path('/tmp/wiki-ci'))
          import asyncio
          async def probe():
              tools = await mcp.list_tools()
              assert len(tools) == 6, f'expected 6 tools, got {len(tools)}'
              print('tools:', [t.name for t in tools])
          asyncio.run(probe())
          "

      - name: Verify trigram tokenizer is available
        run: |
          python -c "
          import sqlite3
          c = sqlite3.connect(':memory:')
          c.execute(\"CREATE VIRTUAL TABLE t USING fts5(x, tokenize='trigram')\")
          print('sqlite', sqlite3.sqlite_version, '+ trigram OK')
          "

  build-python:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    needs: test-offline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python -m pip install --upgrade pip build

      - name: Build ringwood
        run: |
          cd packages/ringwood
          python -m build --sdist --wheel

      - name: Build ringwood-mcp
        run: |
          cd packages/ringwood-mcp
          python -m build --sdist --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: |
            packages/ringwood/dist/*
            packages/ringwood-mcp/dist/*

  build-npm:
    name: npm pack (dry run)
    runs-on: ubuntu-latest
    needs: test-offline
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm pack
        run: |
          cd packages/npm-launcher
          npm pack --dry-run

      - name: Launcher --help runs
        run: node packages/npm-launcher/bin/ringwood.js --help
